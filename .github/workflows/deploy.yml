name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/corelink.dev
            
            echo "🔐 Fixing permissions for git..."
            DEPLOY_USER="$(whoami)"
            DEPLOY_GROUP="$(id -gn)"
            sudo chown -R "${DEPLOY_USER}:${DEPLOY_GROUP}" .
            
            echo "📥 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/main
            
            echo "📦 Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction
            
            echo "📦 Installing NPM dependencies..."
            npm ci
            
            echo "🔨 Building frontend assets..."
            npm run build
            
            echo "🛑 Stopping SSR server..."
            php artisan inertia:stop-ssr 2>/dev/null || true
            
            echo "🗄️ Running migrations..."
            php artisan migrate --force
            
            echo "🌱 Seeding projects..."
            php artisan db:seed --class=ProjectSeeder --force
            
            echo "🔗 Creating storage symlink..."
            php artisan storage:link --force
            
            echo "🧹 Clearing and caching..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            
            echo "🔐 Setting permissions..."
            if getent group nginx >/dev/null 2>&1; then
              WEB_GROUP="nginx"
            elif getent group www-data >/dev/null 2>&1; then
              WEB_GROUP="www-data"
            else
              WEB_GROUP="${DEPLOY_GROUP}"
            fi
            sudo chown -R "${DEPLOY_USER}:${WEB_GROUP}" storage bootstrap/cache public/build
            sudo chmod -R 775 storage bootstrap/cache
            
            echo "🔄 Restarting services..."
            php artisan queue:restart
            sudo systemctl reload php-fpm || echo "Could not reload PHP-FPM"
            
            echo "🌐 Starting SSR server..."
            sudo supervisorctl restart inertia-ssr 2>/dev/null || echo "Supervisor not configured for SSR"
            
            echo "✅ Deployment complete!"
